spring:
  jpa:
    show-sql: true
  mvc:
    pathmatch:
        matching-strategy: ant-path-matcher
  web:
      resources:
        chain:
          strategy:
            content:
              enabled: true
              paths: /**

        #  fixed:
        # # enabled: true
        #  paths: /css/**,/js/**
        #  version: v1
        cache:
          cachecontrol:
            cache-private: false
            cache-public: true
            max-age: 21603
            s-max-age: 21604

  thymeleaf:
    mode: HTML
    cache: false
    #prefix: file:./templates/

  messages:
      basename: messages,ValidationMessages
      cache-duration: -1
      encoding: utf-8
      fallback-to-system-locale: false

#logging.file: /var/log/tomcat/webcatalog.log
logging:
  pattern.file: "%d{yy-MM-dd HH:mm:ss.SSS} [%p] %m %n"
  pattern.console: "%d{yy-MM-dd HH:mm:ss.SSS} %clr([%5p]) %m %n"
  
  file.name: /opt/tomcat/logs/webcatalog.log

  logback:
      rollingpolicy:
        max-file-size: 10MB
        max-history: 10

  level:
#        org.springframework: off
#        com.smc: info
#        org.thymeleaf: off
        org.springframework: info
        com.smc: debug
        org.thymeleaf: off
#        org.springframework: debug
#        com.smc: debug
#        org.thymeleaf: off
server:
  servlet:
    session.tracking-modes: cookie
    session.timeout: 30m
  
springdoc:
  api-docs:
    path: /login/admin/api-docs
  
  swagger-ui:
    path: /login/admin/swagger
  
  packages-to-scan: com.smc.webcatalog.api,com.smc.discontinued.api
  paths-to-match: /api/v1/**,/discontinued/api/v1/**