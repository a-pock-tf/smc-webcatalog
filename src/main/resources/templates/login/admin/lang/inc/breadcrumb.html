<!DOCTYPE html>
<html lang="ja" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="utf-8">
</head>

<body>

  <!-- リストの新規・並び替え -->
  <div th:fragment="breadcrumb">

    <!-- パンくず デフォルト -->
    <div th:if="${breadcrumb == null}" class="ui breadcrumb">
      <a href="/" class="section"><i class="folder open icon category"></i> Root</a>
      <span class="divider"> / </span>
      <a href="/" class="section">[[#{g.title}]]</a>
      <span class="divider"> / </span>
      <a class="active section">[[#{g.lang}]]</a>
    </div>

    <!-- パンくず 通常表示 -->
    <div th:if="${breadcrumb != null}" class="ui breadcrumb">
      <span th:each="bc,stat : ${breadcrumb}" th:object="${bc}">
        <span th:if="${stat.count != 1}" class="divider"> / </span>
        <a th:href="@{|/login/admin/category/*{id}|}" class="section"><i th:if="${stat.count==1}"
            class="folder open icon category"></i> [[*{name}]]</a>
      </span>
    </div>

  </div>

</body>

</html>
